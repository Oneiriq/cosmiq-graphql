name: Auto-merge labeled PRs

# Companion to dependabot-auto-merge.yml that handles internal-bot PRs
# (e.g. the deno-update workflow's branches). Re-runs the gates locally
# rather than waiting for `ci.yml` because PRs opened by GITHUB_TOKEN do
# not trigger downstream workflows; running the gates in-line keeps the
# loop self-contained without requiring a PAT.
#
# Scope is intentionally narrow:
#   - Only PRs targeting `main`.
#   - Only PRs whose head branch was pushed to this repo (no forks).
#   - Only when the PR carries the `auto-merge` label.
on:
  pull_request:
    types: [labeled, opened, synchronize, reopened]
    branches: [main]

permissions:
  pull-requests: write
  contents: write

jobs:
  gates-and-merge:
    if: >-
      contains(github.event.pull_request.labels.*.name, 'auto-merge') &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.login == 'github-actions[bot]' &&
      startsWith(github.event.pull_request.head.ref, 'chore/deno-update-')
    runs-on: [self-hosted, aur0]
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check formatting
        run: deno fmt --check

      - name: Lint
        run: deno lint

      - name: Lint JSDoc
        run: deno doc --lint mod.ts

      - name: Type check
        run: deno check mod.ts

      - name: Tests
        run: deno test -A --ignore="src/test/auth.test.ts" -q

      - name: Approve + admin-merge
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --squash --delete-branch --admin "$PR_URL"
